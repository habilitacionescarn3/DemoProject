version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=devopsdb
      - DB_USER=postgres
      - DB_PASSWORD=mon_mot_de_passe_super_secret
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=devopsdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mon_mot_de_passe_super_secret
    ports:
      - "5432:5432"